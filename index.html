<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>Three.js — Hyperspace Portal</title>
    <style>
      :root {
        --bg: #04060b;
        --ink: #e6eefc;
        --muted: #9bb0cf;
        --a: #60a5fa;
        --b: #6ee7b7;
        --c: #f59e0b;
        --d: #a78bfa;
        --e: #f87171;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
      }
      body {
        margin: 0;
        overflow: hidden;
        background: radial-gradient(
            1200px 800px at 80% -10%,
            #0c1630 0%,
            transparent 60%
          ),
          var(--bg);
        color: var(--ink);
        font-family: ui-sans-serif, system-ui, Apple SD Gothic Neo, Segoe UI,
          Roboto, Pretendard, Helvetica, Arial, sans-serif;
      }
      #app {
        position: fixed;
        inset: 0;
      }
      #hud {
        position: fixed;
        left: 12px;
        top: 12px;
        z-index: 10;
        display: flex;
        gap: 10px;
        align-items: center;
        backdrop-filter: blur(8px) saturate(140%);
        background: rgba(10, 16, 28, 0.4);
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 12px;
        padding: 8px 10px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
      }
      .chip {
        font-size: 12px;
        color: var(--muted);
        border: 1px dashed rgba(255, 255, 255, 0.2);
        padding: 5px 8px;
        border-radius: 999px;
      }
      .dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        display: inline-block;
        background: radial-gradient(circle at 30% 30%, #fff, var(--a));
      }
      #hint {
        position: fixed;
        right: 12px;
        bottom: 12px;
        font-size: 12px;
        color: var(--muted);
        background: rgba(10, 16, 28, 0.4);
        border: 1px solid rgba(255, 255, 255, 0.12);
        padding: 6px 10px;
        border-radius: 10px;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="hud">
      <span class="dot"></span><span>Hyperspace Portal</span
      ><span class="chip">Drag: Orbit</span><span class="chip">Wheel: Zoom</span
      ><span class="chip">Scroll page: Pulse</span>
    </div>
    <div id="hint">
      Three.js + PostFX (Bloom/RGBShift/Afterimage) · No assets · Pure math ✨
    </div>

    <!-- 모듈 엔트리 -->
    <script type="module" src="./main.js"></script>
  </body>
</html>
